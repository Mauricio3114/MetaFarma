{% extends "base.html" %}

{% block title %}Nova Badge | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Nova badge de meta</h1>
        <p>Cadastre a cor e os valores do turno da manhã e da tarde</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Nome da badge</label>
            <input type="text" name="nome" placeholder="Ex: Verde" required>
        </div>

        <div class="form-group">
            <label>Cor</label>
            <input type="color" name="cor_hex" value="#22c55e" required>
        </div>

        <div class="form-group">
            <label>Valor da manhã (07:00 às 14:00)</label>
            <input type="text" name="valor_manha" placeholder="Ex: 2800" required>
        </div>

        <div class="form-group">
            <label>Valor da tarde</label>
            <input type="text" name="valor_tarde" placeholder="Ex: 2200" required>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa">Ativa</option>
                <option value="inativa">Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4" placeholder="Ex: Segunda usa verde, sexta usa laranja..."></textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('badges.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar badge</button>
        </div>
    </form>
</div>
{% endblock %}
