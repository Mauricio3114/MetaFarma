{% extends "base.html" %}
{% block title %}Novo Feriado | MetaFarma{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Novo feriado</h1>
        <p>Defina a data que deve usar a regra de feriado</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Farmácia</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}">{{ farmacia.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Data</label>
            <input type="date" name="data" required>
        </div>

        <div class="form-group full-width">
            <label>Descrição</label>
            <input type="text" name="descricao" placeholder="Ex: Natal" required>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('feriados.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>
</div>
{% endblock %}
