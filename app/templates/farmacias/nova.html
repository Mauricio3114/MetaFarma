{% extends "base.html" %}

{% block title %}Nova Farmácia | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Nova farmácia</h1>
        <p>Cadastre uma nova unidade no sistema</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Nome da farmácia</label>
            <input type="text" name="nome" required>
        </div>

        <div class="form-group">
            <label>Responsável</label>
            <input type="text" name="responsavel">
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" name="cidade">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" name="telefone">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa">Ativa</option>
                <option value="inativa">Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4"></textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('farmacias.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar farmácia</button>
        </div>
    </form>
</div>
{% endblock %}
