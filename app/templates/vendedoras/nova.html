{% extends "base.html" %}

{% block title %}Nova Vendedora | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Nova vendedora</h1>
        <p>Cadastre uma nova vendedora por farmácia</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Farmácia</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}">{{ farmacia.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="nome" placeholder="Ex: Maurício" required>
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" name="telefone" placeholder="Ex: 85999999999">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa">Ativa</option>
                <option value="inativa">Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4" placeholder="Ex: Trabalha mais na manhã, folga na sexta..."></textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('vendedoras.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar vendedora</button>
        </div>
    </form>
</div>
{% endblock %}
