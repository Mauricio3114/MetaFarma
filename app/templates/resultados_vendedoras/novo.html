{% extends "base.html" %}

{% block content %}
<h2>Lançar resultado da vendedora</h2>

<form method="POST">

    <label>Farmácia</label>
    <select name="farmacia_id" required>
        {% for f in farmacias %}
            <option value="{{ f.id }}">{{ f.nome }}</option>
        {% endfor %}
    </select>

    <label>Vendedora</label>
    <select name="vendedora_id" required>
        {% for v in vendedoras %}
            <option value="{{ v.id }}">{{ v.nome }}</option>
        {% endfor %}
    </select>

    <label>Turno</label>
    <select name="turno">
        <option value="manha">Manhã</option>
        <option value="tarde">Tarde</option>
    </select>

    <label>Valor vendido</label>
    <input type="number" step="0.01" name="valor">

    <label>Pedidos</label>
    <input type="number" name="pedidos">

    <button type="submit">Salvar</button>
</form>

{% endblock %}
