{% extends "base.html" %}

{% block title %}Editar Escala de Vendedora | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Editar escala de vendedora</h1>
        <p>Atualize a vendedora e o turno fixo</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        
        <div class="form-group">
            <label>Farmácia</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}"
                        {% if farmacia.id == escala.farmacia_id %}selected{% endif %}>
                        {{ farmacia.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Vendedora</label>
            <select name="vendedora_id" required>
                <option value="">Selecione</option>
                {% for vendedora in vendedoras %}
                    <option value="{{ vendedora.id }}"
                        {% if vendedora.id == escala.vendedora_id %}selected{% endif %}>
                        {{ vendedora.nome }} - {{ vendedora.farmacia.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Turno</label>
            <select name="turno" required>
                <option value="">Selecione</option>
                {% for t in turnos %}
                    <option value="{{ t }}"
                        {% if t == escala.turno %}selected{% endif %}>
                        {{ t }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa" {% if escala.status == "ativa" %}selected{% endif %}>Ativa</option>
                <option value="inativa" {% if escala.status == "inativa" %}selected{% endif %}>Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4">{{ escala.observacao or "" }}</textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('escalas_vendedoras.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar alterações</button>
        </div>

    </form>
</div>
{% endblock %}
