{% extends "base.html" %}

{% block title %}Nova Equipe | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Nova equipe</h1>
        <p>Cadastre uma nova equipe por farmácia</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Farmácia</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}">{{ farmacia.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Nome da equipe</label>
            <input type="text" name="nome" placeholder="Ex: Equipe Manhã Centro" required>
        </div>

        <div class="form-group">
            <label>Turno</label>
            <select name="turno" required>
                <option value="">Selecione</option>
                <option value="turno1">Turno 1</option>
                <option value="turno2">Turno 2</option>
            </select>
        </div>

        <div class="form-group">
            <label>Responsável</label>
            <input type="text" name="responsavel" placeholder="Nome do responsável">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa">Ativa</option>
                <option value="inativa">Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4"></textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('equipes.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar equipe</button>
        </div>
    </form>
</div>
{% endblock %}
