{% extends "base.html" %}

{% block title %}Editar Equipe | MetaFarma{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Editar equipe</h1>
        <p>Atualize os dados da equipe cadastrada</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Farmácia</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}" {% if equipe.farmacia_id == farmacia.id %}selected{% endif %}>
                        {{ farmacia.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Nome da equipe</label>
            <input type="text" name="nome" value="{{ equipe.nome }}" required>
        </div>

        <div class="form-group">
            <label>Turno</label>
            <select name="turno" required>
                <option value="">Selecione</option>
                <option value="turno1" {% if equipe.turno == 'turno1' %}selected{% endif %}>Turno 1</option>
                <option value="turno2" {% if equipe.turno == 'turno2' %}selected{% endif %}>Turno 2</option>
            </select>
        </div>

        <div class="form-group">
            <label>Responsável</label>
            <input type="text" name="responsavel" value="{{ equipe.responsavel or '' }}">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="ativa" {% if equipe.status == 'ativa' %}selected{% endif %}>Ativa</option>
                <option value="inativa" {% if equipe.status == 'inativa' %}selected{% endif %}>Inativa</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Observação</label>
            <textarea name="observacao" rows="4">{{ equipe.observacao or '' }}</textarea>
        </div>

        <div class="form-actions full-width">
            <a href="{{ url_for('equipes.listar') }}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Atualizar equipe</button>
        </div>
    </form>
</div>
{% endblock %}
